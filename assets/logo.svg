<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Max Cure Clinic logo">
  <!-- Rounded square badge -->
  <rect x="2" y="2" width="44" height="44" rx="13" fill="#8B0000"/>
  <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#mc_grad)" fill-opacity="0.35"/>
  <!-- Stethoscope arc -->
  <path d="M14 14v6a8 8 0 0 0 16 0v-6" stroke="#E8E4E0" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.9"/>
  <circle cx="32.5" cy="27" r="3.4" stroke="#E8E4E0" stroke-width="2.2" fill="none" opacity="0.9"/>
  <!-- Medical cross -->
  <path d="M24 19.5v9M19.5 24h9" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="56" y="22" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="800" letter-spacing="0.5" fill="#0D0D0D">MAX CURE</text>
  <text x="56" y="39" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="700" letter-spacing="4.5" fill="#8B0000">CLINIC</text>
  <defs>
    <linearGradient id="mc_grad" x1="2" y1="2" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A31515"/>
      <stop offset="1" stop-color="#5C0000"/>
    </linearGradient>
  </defs>
</svg>
